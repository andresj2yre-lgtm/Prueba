name: Linux SSH Server

on:
  workflow_dispatch:

jobs:
  linux-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 999999

    steps:
      - name: Update system and install tools
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y openssh-server curl

      - name: Configure SSH
        run: |
          sudo systemctl enable ssh
          sudo systemctl start ssh
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=linux-ssh-${{ github.run_id }}

      - name: Show Connection Info
        run: |
          echo "=== SSH CONNECTION READY ==="
          echo "IP: $(tailscale ip -4)"
          echo "User: root"
          echo "Use PuTTY or SSH with the IP above"
          echo "============================="

      - name: Keep Server Running
        run: |
          echo "Server is running indefinitely..."
          while true; do
            sleep 300
          done
