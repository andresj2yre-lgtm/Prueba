name: Minimal Ubuntu SSH Server

on:
  workflow_dispatch:

jobs:
  minimal-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 999999

    steps:
      - name: Minimal System Setup
        run: |
          sudo apt update -qq
          sudo apt upgrade -y -qq
          sudo apt install -y openssh-server curl --no-install-recommends
          sudo apt autoremove -y -qq

      - name: Configure SSH Root Access
        run: |
          sudo systemctl enable --now ssh
          sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          echo "root:YourSecurePassword123" | sudo chpasswd
          sudo systemctl restart ssh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=minimal-ssh-${{ github.run_id }}

      - name: Show Connection Info
        run: |
          echo "=== CONNECTION INFORMATION ==="
          echo "Tailscale IP: $(tailscale ip -4)"
          echo "Username: root"
          echo "Password: YourSecurePassword123"
          echo "================================="
          echo "Connect using PuTTY with the IP above"

      - name: Keep Server Running Indefinitely
        run: |
          echo "Minimal server is running indefinitely..."
          while true; do
            sleep 300
          done
